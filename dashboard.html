<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Productivity Dashboard</title>
    <style>
        /* CSS STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        header h1 {
            font-size: 3.5rem;
            margin-bottom: 5px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-bottom: 30px;
        }

        .weather-box {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .weather-box h3 { font-size: 1.4rem; margin-bottom: 5px; color: #00d2ff; }
        .weather-box #temp { font-size: 2rem; font-weight: bold; }

        .todo-section {
            text-align: left;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: none;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            color: #333;
        }

        button {
            padding: 12px 20px;
            background: #00d2ff;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover {
            background: #3a7bd5;
            transform: translateY(-2px);
        }

        ul {
            list-style: none;
            max-height: 200px;
            overflow-y: auto;
        }

        li {
            background: rgba(255, 255, 255, 0.1);
            margin-bottom: 8px;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1 id="clock">00:00:00</h1>
            <p id="date">-- -- ----</p>
        </header>

        <div class="weather-box">
            <h3 id="location">Location Loading...</h3>
            <p id="temp">--°C</p>
            <p id="desc">Fetching current weather</p>
        </div>

        <div class="todo-section">
            <div class="input-group">
                <input type="text" id="todo-input" placeholder="What's the plan for today?">
                <button id="add-btn">Add</button>
            </div>
            <ul id="todo-list"></ul>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC
        
        // 1. Live Clock & Date
        function updateTime() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], { hour12: false });
            document.getElementById('date').innerText = now.toLocaleDateString(undefined, { 
                weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' 
            });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. Mock Weather Data (Demonstrating API Logic)
        function fetchWeather() {
            // In a real project, you'd use: fetch(`https://api.openweathermap.org/data/2.5/weather?q=CITY&appid=KEY`)
            setTimeout(() => {
                document.getElementById('location').innerText = "Bhopal, India";
                document.getElementById('temp').innerText = "31°C";
                document.getElementById('desc').innerText = "Partly Cloudy";
            }, 1500);
        }
        fetchWeather();

        // 3. To-Do List functionality
        const input = document.getElementById('todo-input');
        const btn = document.getElementById('add-btn');
        const list = document.getElementById('todo-list');

        function addTask() {
            const taskValue = input.value.trim();
            if (taskValue === "") return;

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskValue}</span>
                <span style="cursor:pointer; color:#ff4d4d;" onclick="this.parentElement.remove()">✕</span>
            `;
            list.appendChild(li);
            input.value = "";
        }

        btn.addEventListener('click', addTask);
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
